<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SIE Upload{% endblock %}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 760px;
            margin: 40px auto;
            padding: 0 20px;
            color: #1a1a1a;
            line-height: 1.5;
        }
        h1 { font-size: 22px; margin: 0 0 8px 0; }
        h2 { font-size: 16px; color: #374151; margin-top: 28px; }
        .user { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
        a { color: #1d4ed8; }
        .flash {
            padding: 10px 14px; border-radius: 4px; margin-bottom: 16px;
            font-size: 14px;
        }
        .flash.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .flash.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 14px; }
        th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #e5e7eb; vertical-align: top; }
        th { color: #6b7280; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn {
            display: inline-block; background: #1a1a1a; color: #fff;
            padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 13px;
        }
        .btn:hover { background: #374151; }
        .empty { color: #6b7280; font-style: italic; padding: 24px 0; }
        form.upload { margin-top: 20px; }
        form.upload label { display: block; margin-bottom: 8px; font-size: 13px; color: #374151; }
        form.upload input[type=file], form.upload select {
            display: block; margin-bottom: 16px; padding: 6px; font-size: 14px;
        }
        form.upload button {
            background: #1a1a1a; color: #fff; border: 0; border-radius: 4px;
            padding: 8px 18px; font-size: 14px; cursor: pointer;
        }
        .hint { color: #6b7280; font-size: 12px; }
        .muted { color: #9ca3af; }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
            <div class="flash {{ category }}">{{ msg }}</div>
        {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
</body>
</html>

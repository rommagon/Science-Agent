name: Prepare Week PDFs (Wednesday)

on:
  schedule:
    # Every Wednesday at 18:00 UTC (2:00pm EST, 1:00pm EDT) — about
    # 12 hours before the Thursday digest send at 06:00 UTC.
    - cron: '0 18 * * 3'
  # Keep-alive: prevent GitHub from auto-disabling after 60 days of inactivity
  push:
    branches:
      - main
    paths:
      - '.github/workflows/prepare-week-pdfs.yml'
  workflow_dispatch:
    inputs:
      alert_recipients:
        description: 'Comma-separated alert recipient emails'
        required: false
        default: 'rom@spotitearly.com'
        type: string
      min_score:
        description: 'Minimum relevancy score threshold (default: 70)'
        required: false
        default: '70'
        type: string
      top_n:
        description: 'Max number of must-reads to prep (default: 5)'
        required: false
        default: '5'
        type: string
      dry_run:
        description: 'Dry run: log everything, write nothing, send nothing'
        required: false
        default: 'false'
        type: string

jobs:
  prepare-pdfs:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Run OA-PDF prep on EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ai.spotitearly.com
          EC2_USER: ubuntu
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
          UPLOAD_BASE_URL: ${{ secrets.UPLOAD_BASE_URL }}
        run: |
          # Write SSH key from hex-encoded secret (matches weekly-digest.yml)
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" | xxd -r -p > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          RECIPIENTS="${{ inputs.alert_recipients || 'rom@spotitearly.com' }}"
          MIN_SCORE="${{ inputs.min_score || '70' }}"
          TOP_N="${{ inputs.top_n || '5' }}"
          DRY_RUN="${{ inputs.dry_run || 'false' }}"

          DRY_FLAG=""
          if [ "$DRY_RUN" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" bash -s << REMOTE_SCRIPT
            set -e
            cd /home/ubuntu/sie-ai/acitracker_v1
            git pull --ff-only origin main
            source .venv/bin/activate

            export DATABASE_URL="postgresql://sie-ai:postgres@localhost:5432/sie-ai"
            export GMAIL_ADDRESS="$GMAIL_ADDRESS"
            export GMAIL_APP_PASSWORD="$GMAIL_APP_PASSWORD"
            export UNPAYWALL_EMAIL="$UNPAYWALL_EMAIL"
            export UPLOAD_BASE_URL="$UPLOAD_BASE_URL"
            export PYTHONUTF8=1
            export PYTHONIOENCODING=utf-8

            mkdir -p /home/ubuntu/sie-ai/pdfs

            python3 -u scripts/prepare_week_pdfs.py \
              --week this \
              --top-n "$TOP_N" \
              --min-score "$MIN_SCORE" \
              --pdf-dir /home/ubuntu/sie-ai/pdfs \
              --upload-base-url "\$UPLOAD_BASE_URL" \
              --unpaywall-email "\$UNPAYWALL_EMAIL" \
              --alert-to "$RECIPIENTS" \
              --gmail \
              $DRY_FLAG \
              --verbose
          REMOTE_SCRIPT

      - name: Summary
        if: success()
        run: |
          echo "## Wednesday PDF Prep Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** EC2 (ai.spotitearly.com)" >> $GITHUB_STEP_SUMMARY
          echo "**Top N:** ${{ inputs.top_n || '5' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Min Score:** ${{ inputs.min_score || '70' }}" >> $GITHUB_STEP_SUMMARY

      - name: Failure notification
        if: failure()
        run: |
          echo "## Wednesday PDF Prep Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the workflow logs for details. Thursday digest will still send; attachments may be missing." >> $GITHUB_STEP_SUMMARY

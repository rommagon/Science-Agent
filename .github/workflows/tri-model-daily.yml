name: Tri-Model Daily Run

on:
  schedule:
    # Run daily at 3:45 PM UTC (7:45am PST / 10:45am EST)
    - cron: '45 15 * * *'
  # Keep-alive: prevent GitHub from auto-disabling this workflow after 60 days of inactivity
  push:
    branches:
      - main
    paths:
      - '.github/workflows/tri-model-daily.yml'
  workflow_dispatch:
    inputs:
      max_papers:
        description: 'Maximum papers to review (leave empty for uncapped)'
        required: false
        default: ''
        type: string
      lookback_hours:
        description: 'Lookback window in hours'
        required: false
        default: '48'
        type: string
      prompt_version:
        description: 'Prompt version (v1, v2, v3)'
        required: false
        default: 'v3'
        type: string
      ingest:
        description: 'Ingest to backend'
        required: false
        default: true
        type: boolean

jobs:
  tri-model-daily-run:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Run tri-model daily on EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ai.spotitearly.com
          EC2_USER: ubuntu
          # Pass API keys to the remote machine
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_MODEL: 'claude-3-haiku-20240307'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SPOTITEARLY_LLM_API_KEY: ${{ secrets.SPOTITEARLY_LLM_API_KEY }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          LINKEDIN_MANAGER_SUPABASE_URL: ${{ secrets.LINKEDIN_MANAGER_SUPABASE_URL }}
          LINKEDIN_MANAGER_SUPABASE_SERVICE_KEY: ${{ secrets.LINKEDIN_MANAGER_SUPABASE_SERVICE_KEY }}
        run: |
          # Write SSH key to file
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Build the remote command
          MAX_PAPERS="${{ inputs.max_papers }}"
          LOOKBACK="${{ inputs.lookback_hours || '48' }}"
          PROMPT_VERSION="${{ inputs.prompt_version || 'v3' }}"
          INGEST="${{ inputs.ingest }}"

          CMD="python3 -u run_tri_model_daily.py"
          if [ -n "$MAX_PAPERS" ]; then
            CMD="$CMD --max-papers $MAX_PAPERS"
          fi
          CMD="$CMD --lookback-hours $LOOKBACK"
          CMD="$CMD --prompt-version $PROMPT_VERSION"
          CMD="$CMD --enable-gating"

          # Add backend ingestion flag
          if [ "$INGEST" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            CMD="$CMD --ingest-backend --ingest-strict"
          fi

          echo "Executing on EC2: $CMD"

          # SSH into EC2 and run the pipeline
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" bash -s << REMOTE_SCRIPT
            set -e
            cd /home/ubuntu/sie-ai/acitracker_v1

            # Pull latest code
            git pull --ff-only origin main

            # Activate virtual environment
            source .venv/bin/activate

            # Set environment variables (Postgres is local)
            export DATABASE_URL="postgresql://sie-ai:postgres@localhost:5432/sie-ai"
            export BACKEND_URL="http://localhost:8000"
            export BACKEND_API_KEY="$BACKEND_API_KEY"
            export CLAUDE_API_KEY="$CLAUDE_API_KEY"
            export CLAUDE_MODEL="$CLAUDE_MODEL"
            export GEMINI_API_KEY="$GEMINI_API_KEY"
            export SPOTITEARLY_LLM_API_KEY="$SPOTITEARLY_LLM_API_KEY"
            export TRI_MODEL_MINI_DAILY="true"
            export TRI_MODEL_PROMPT_VERSION="$PROMPT_VERSION"
            export PYTHONUTF8=1
            export PYTHONIOENCODING=utf-8
            export LC_ALL=C.UTF-8
            export LANG=C.UTF-8

            echo "Running: $CMD"
            $CMD
          REMOTE_SCRIPT

      - name: Sync publications to LinkedIn Manager
        if: success()
        continue-on-error: true
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ai.spotitearly.com
          EC2_USER: ubuntu
          LINKEDIN_MANAGER_SUPABASE_URL: ${{ secrets.LINKEDIN_MANAGER_SUPABASE_URL }}
          LINKEDIN_MANAGER_SUPABASE_SERVICE_KEY: ${{ secrets.LINKEDIN_MANAGER_SUPABASE_SERVICE_KEY }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" bash -s << REMOTE_SCRIPT
            cd /home/ubuntu/sie-ai/acitracker_v1
            source .venv/bin/activate
            export DATABASE_URL="postgresql://sie-ai:postgres@localhost:5432/sie-ai"
            export LINKEDIN_MANAGER_SUPABASE_URL="$LINKEDIN_MANAGER_SUPABASE_URL"
            export LINKEDIN_MANAGER_SUPABASE_SERVICE_KEY="$LINKEDIN_MANAGER_SUPABASE_SERVICE_KEY"
            python3 -u sync_to_linkedin.py
          REMOTE_SCRIPT

      - name: Summary
        if: success()
        run: |
          echo "## Tri-Model Daily Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** EC2 (ai.spotitearly.com)" >> $GITHUB_STEP_SUMMARY
          echo "**Database:** Local PostgreSQL (no external exposure)" >> $GITHUB_STEP_SUMMARY

      - name: Failure notification
        if: failure()
        run: |
          echo "## Tri-Model Daily Run Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY

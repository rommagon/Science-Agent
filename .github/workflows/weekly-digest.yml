name: Weekly Digest Email

on:
  schedule:
    # Run every Thursday at 06:00 UTC (1:00am EST)
    # Looks back 7 days from run time
    - cron: '0 6 * * 4'
  # Keep-alive: prevent GitHub from auto-disabling after 60 days of inactivity
  push:
    branches:
      - main
    paths:
      - '.github/workflows/weekly-digest.yml'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Number of days to look back from now (default: 7)'
        required: false
        default: '7'
        type: string
      recipients:
        description: 'Comma-separated recipient emails (default: rom@spotitearly.com)'
        required: false
        default: 'rom@spotitearly.com'
        type: string
      min_score:
        description: 'Minimum relevancy score threshold (default: 70)'
        required: false
        default: '70'
        type: string
      top_n:
        description: 'Max number of publications to include (default: 5)'
        required: false
        default: '5'
        type: string

jobs:
  send-weekly-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Generate and send weekly digest on EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ai.spotitearly.com
          EC2_USER: ubuntu
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_FEEDBACK_SECRET: ${{ secrets.DIGEST_FEEDBACK_SECRET }}
          DIGEST_FEEDBACK_BASE_URL: ${{ secrets.DIGEST_FEEDBACK_BASE_URL }}
        run: |
          # Write SSH key from hex-encoded secret
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" | xxd -r -p > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          RECIPIENTS="${{ inputs.recipients || 'rom@spotitearly.com' }}"
          MIN_SCORE="${{ inputs.min_score || '70' }}"
          TOP_N="${{ inputs.top_n || '5' }}"
          LOOKBACK="${{ inputs.lookback_days || '7' }}"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" bash -s << REMOTE_SCRIPT
            set -e
            cd /home/ubuntu/sie-ai/acitracker_v1
            git pull --ff-only origin main
            source .venv/bin/activate

            export DATABASE_URL="postgresql://sie-ai:postgres@localhost:5432/sie-ai"
            export GMAIL_ADDRESS="$GMAIL_ADDRESS"
            export GMAIL_APP_PASSWORD="$GMAIL_APP_PASSWORD"
            export DIGEST_FEEDBACK_SECRET="$DIGEST_FEEDBACK_SECRET"
            export DIGEST_FEEDBACK_BASE_URL="$DIGEST_FEEDBACK_BASE_URL"
            export PYTHONUTF8=1
            export PYTHONIOENCODING=utf-8

            # Calculate date window
            WEEK_DATES=\$(python3 -c "from datetime import date, timedelta; today = date.today(); lookback = int('$LOOKBACK'); start = today - timedelta(days=lookback); print(f'{start.isoformat()} {today.isoformat()}')")
            WEEK_START_DATE=\$(echo "\$WEEK_DATES" | cut -d' ' -f1)
            WEEK_END_DATE=\$(echo "\$WEEK_DATES" | cut -d' ' -f2)

            echo "Window: \$WEEK_START_DATE to \$WEEK_END_DATE ($LOOKBACK days back)"
            echo "Recipients: $RECIPIENTS"

            python3 -u scripts/generate_weekly_digest.py \
              --week-start "\$WEEK_START_DATE" \
              --week-end "\$WEEK_END_DATE" \
              --send \
              --gmail \
              --to "$RECIPIENTS" \
              --min-score "$MIN_SCORE" \
              --top-n "$TOP_N" \
              --verbose
          REMOTE_SCRIPT

      - name: Summary
        if: success()
        run: |
          echo "## Weekly Digest Sent" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** EC2 (ai.spotitearly.com)" >> $GITHUB_STEP_SUMMARY
          RECIPIENTS="${{ inputs.recipients || 'rom@spotitearly.com' }}"
          echo "**Recipients:** $RECIPIENTS" >> $GITHUB_STEP_SUMMARY

      - name: Failure notification
        if: failure()
        run: |
          echo "## Weekly Digest Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY

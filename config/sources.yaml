    type: pubmed
    # NLM title is "Animals (Basel)" to disambiguate
    query: '"Animals (Basel)"[Journal]'
    retmax: 200

  - name: Animal Cognition
    type: pubmed
    query: '"Anim Cogn"[Journal]'
    retmax: 200

  - name: Chemical Senses

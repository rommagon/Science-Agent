# Sources configuration for acitrack
#
# Each source should have:
#   - name: Human-readable name for the source
#   - type: Source type (rss, web, api)
#   - url: URL to fetch content from
#
# Additional fields may be added as needed for specific source types

sources:
  # RSS feed sources
  # Note: Nature subject RSS feeds have been deprecated
  # Using Nature Cancer journal feed instead
  - name: Nature Cancer
    type: rss
    url: https://www.nature.com/natcancer.rss

  - name: Science News
    type: rss
    url: https://www.science.org/rss/news_current.xml

  - name: bioRxiv (all)
    type: rss
    url: https://connect.biorxiv.org/biorxiv_xml.php?subject=all

  - name: medRxiv (all)
    type: rss
    url: https://www.medrxiv.org/rss.xml

  # PubMed E-utilities sources
  - name: PubMed - cancer (broad)
    type: pubmed
    query: cancer
    retmax: 200

  # --- Udi-requested journals ---
  # NOTE: queries use the NLM Title Abbreviation with the [Journal] field tag.
  # This performs a true journal-field search. Do NOT use the `journal:"Full Name"`
  # form — PubMed silently rewrites it to an all-fields match, which either
  # over-fetches unrelated articles or misses the journal entirely.
  - name: Journal of Osteopathic Medicine
    type: pubmed
    # Formerly "Journal of the American Osteopathic Association" (ceased 2020)
    query: '"J Osteopath Med"[Journal]'
    retmax: 200

  - name: PLoS One
    type: pubmed
    query: '"PLoS One"[Journal]'
    retmax: 200

  - name: European Journal of Cardio-Thoracic Surgery
    type: pubmed
    query: '"Eur J Cardiothorac Surg"[Journal]'
    retmax: 200

  - name: Israel Medical Association Journal
    type: pubmed
    query: '"Isr Med Assoc J"[Journal]'
    retmax: 200

  - name: The Journal of Urology
    type: pubmed
    query: '"J Urol"[Journal]'
    retmax: 200

  - name: BMC Cancer
    type: pubmed
    query: '"BMC Cancer"[Journal]'
    retmax: 200

  - name: Interdisciplinary CardioVascular and Thoracic Surgery
    type: pubmed
    # Formerly "Interactive CardioVascular and Thoracic Surgery" (ceased 2022)
    query: '"Interdiscip Cardiovasc Thorac Surg"[Journal]'
    retmax: 200

  - name: European Respiratory Journal
    type: pubmed
    query: '"Eur Respir J"[Journal]'
    retmax: 200

  - name: European Urology
    type: pubmed
    query: '"Eur Urol"[Journal]'
    retmax: 200

  - name: Gut
    type: pubmed
    query: '"Gut"[Journal]'
    retmax: 200

  - name: Journal of Veterinary Behavior
    type: pubmed
    query: '"J Vet Behav"[Journal]'
    retmax: 200

  - name: Integrative Cancer Therapies
    type: pubmed
    query: '"Integr Cancer Ther"[Journal]'
    retmax: 200

  - name: British Medical Journal
    type: pubmed
    query: '"BMJ"[Journal]'
    retmax: 200

  - name: Applied Animal Behaviour Science
    type: pubmed
    query: '"Appl Anim Behav Sci"[Journal]'
    retmax: 200

  - name: The Lancet
    type: pubmed
    query: '"Lancet"[Journal]'
    retmax: 200

  - name: Lancet Oncology
    type: pubmed
    query: '"Lancet Oncol"[Journal]'
    retmax: 200

  - name: Frontiers in Veterinary Science
    type: pubmed
    query: '"Front Vet Sci"[Journal]'
    retmax: 200

  - name: Biology
    type: pubmed
    # MDPI "Biology" — NLM title is "Biology (Basel)" to disambiguate
    query: '"Biology (Basel)"[Journal]'
    retmax: 200

  - name: Acta Oncologica
    type: pubmed
    query: '"Acta Oncol"[Journal]'
    retmax: 200

  - name: BMC Urology
    type: pubmed
    query: '"BMC Urol"[Journal]'
    retmax: 200

  - name: JAMA
    type: pubmed
    query: '"JAMA"[Journal]'
    retmax: 200

  # --- Early detection / screening / biomarkers ---
  - name: Journal of Breath Research
    type: pubmed
    # Breath VOC analysis — directly relevant to canine scent / e-nose detection
    query: '"J Breath Res"[Journal]'
    retmax: 200

  - name: Cancer Epidemiology, Biomarkers & Prevention
    type: pubmed
    query: '"Cancer Epidemiol Biomarkers Prev"[Journal]'
    retmax: 200

  - name: Journal of the National Cancer Institute
    type: pubmed
    query: '"J Natl Cancer Inst"[Journal]'
    retmax: 200

  - name: Cancer Prevention Research
    type: pubmed
    query: '"Cancer Prev Res (Phila)"[Journal]'
    retmax: 200

  - name: New England Journal of Medicine
    type: pubmed

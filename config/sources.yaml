  - name: Annals of Oncology
    type: pubmed
    query: '"Ann Oncol"[Journal]'
    retmax: 200

  # --- Already trusted by the gating venue whitelist; high-signal additions ---
  - name: JAMA Oncology
    type: pubmed
    query: '"JAMA Oncol"[Journal]'
    retmax: 200

  - name: Cancer Discovery
    type: pubmed
    query: '"Cancer Discov"[Journal]'
    retmax: 200

  - name: Science Translational Medicine
    type: pubmed
    query: '"Sci Transl Med"[Journal]'

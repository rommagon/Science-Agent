  - name: International Journal of Cancer
    type: pubmed
    query: '"Int J Cancer"[Journal]'
    retmax: 200

  - name: Nature Communications
    type: pubmed
    # High volume (~40/day, mostly non-cancer) but whitelisted, so all are scored.
    # First lever to trim if tri-model cost climbs.
    query: '"Nat Commun"[Journal]'
    retmax: 200

  # --- High-impact general & multidisciplinary ---
  # High volume; the tri-model 70+ filter gates relevance, so these are breadth
  # insurance against missing landmark detection/screening papers.
  - name: Nature
    type: pubmed
    query: '"Nature"[Journal]'
    retmax: 200

  - name: Science
    type: pubmed
    query: '"Science"[Journal]'
    retmax: 200

  - name: Cell
    type: pubmed
    query: '"Cell"[Journal]'
    retmax: 200

  - name: Cancer Cell
    type: pubmed
    query: '"Cancer Cell"[Journal]'
    retmax: 200

  - name: Nature Reviews Cancer
    type: pubmed
